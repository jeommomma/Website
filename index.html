<!DOCTYPE html>
<html>
<head>
  <title>Gallery</title>

  <style>
    body {
      background: #111;
      margin: 0;
      padding: 20px;
      font-family: Arial;
      color: white;
    }

    h2 {
      color: #aaa;
      font-size: 16px;
      font-weight: normal;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: 0.2s;
    }

    .gallery img:hover {
      transform: scale(1.02);
    }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }

    .lightbox img.main {
      max-width: 90%;
      max-height: 70%;
      border-radius: 10px;
    }

    /* controls */
    .controls {
      position: absolute;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .btn {
      font-size: 40px;
      color: white;
      cursor: pointer;
      user-select: none;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }

    /* ===== THUMBNAILS ===== */
    .thumbs {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      max-width: 90%;
      overflow-x: auto;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      z-index: 10000;
    }

    .thumbs img {
      flex: 0 0 auto;
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0.5;
      transition: 0.2s;
    }

    .thumbs img.active {
      opacity: 1;
      border: 2px solid white;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<h2 id="count">Loading...</h2>

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

  <span class="close" onclick="closeLightbox()">✕</span>

  <div class="controls">
    <span class="btn" onclick="prevImage()">❮</span>
    <span class="btn" onclick="nextImage()">❯</span>
  </div>

  <img id="lightbox-img" class="main">

  <div class="thumbs" id="thumbs"></div>

</div>

<script>
let images = [];
let currentIndex = 0;

const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const thumbs = document.getElementById("thumbs");

fetch("./image_cache.json")
  .then(res => res.json())
  .then(data => {
    images = data;

    document.getElementById("count").innerText = images.length + " images";

    // MAIN GALLERY
    images.forEach((url, index) => {
      const img = document.createElement("img");
      img.src = url;
      img.loading = "lazy";
      img.draggable = false;

      img.onclick = () => openLightbox(index);

      gallery.appendChild(img);
    });
  });

function openLightbox(index) {
  currentIndex = index;
  lightbox.style.display = "flex";
  renderLightbox();
}

function closeLightbox() {
  lightbox.style.display = "none";
}

function renderLightbox() {
  lightboxImg.src = images[currentIndex];

  // build thumbnails
  thumbs.innerHTML = "";

  images.forEach((url, i) => {
    const t = document.createElement("img");
    t.src = url;

    if (i === currentIndex) t.classList.add("active");

    t.onclick = () => {
      currentIndex = i;
      renderLightbox();
    };

    thumbs.appendChild(t);
  });
}

function nextImage() {
  currentIndex = (currentIndex + 1) % images.length;
  renderLightbox();
}

function prevImage() {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  renderLightbox();
}

// keyboard support
document.addEventListener("keydown", (e) => {
  if (lightbox.style.display === "flex") {
    if (e.key === "ArrowRight") nextImage();
    if (e.key === "ArrowLeft") prevImage();
    if (e.key === "Escape") closeLightbox();
  }
});
</script>

</body>
</html>
