<!DOCTYPE html>
<html>
<head>
  <title>Gallery</title>
  <style>
    body {
      background: #111;
      margin: 0;
      padding: 20px;
      font-family: Arial;
      color: white;
    }

    h2 {
      color: #aaa;
      font-size: 16px;
      font-weight: normal;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 10px;
    }

    img {
      width: 100%;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>

<h2 id="count">Loading...</h2>

<div class="gallery" id="gallery"></div>

<script>
fetch("image_cache.json")
  .then(res => res.json())
  .then(images => {
    document.getElementById("count").innerText = images.length + " images";

    const gallery = document.getElementById("gallery");

    images.forEach(url => {
      const img = document.createElement("img");
      img.src = url;

      img.loading = "lazy";
      img.onerror = () => img.style.display = "none";

      gallery.appendChild(img);
    });
  });
</script>

</body>
</html>
