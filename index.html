
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:Arial;padding:20px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
#search{background:#1e1e1e;border:1px solid #333;border-radius:8px;color:#fff;font-size:13px;padding:7px 12px;width:200px;outline:none}
#search:focus{border-color:#555}
#count{color:#888;font-size:13px;flex:1}
.sort-select{background:#1e1e1e;border:1px solid #333;border-radius:8px;color:#fff;font-size:12px;padding:6px 10px;outline:none;cursor:pointer}
.view-btns{display:flex;gap:4px}
.view-btn{background:#1e1e1e;border:1px solid #333;border-radius:6px;color:#999;cursor:pointer;font-size:16px;padding:6px 10px;transition:.15s}
.view-btn.active{background:#2e2e2e;border-color:#555;color:#fff}
.gallery{display:grid;gap:10px}
.gallery.grid-small{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.gallery.grid-medium{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.gallery.grid-large{grid-template-columns:1fr}
.card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;background:#1a1a1a}
.card img{width:100%;display:block;aspect-ratio:4/3;object-fit:cover;transition:.25s;user-select:none}
.card:hover img{transform:scale(1.04)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 60%);opacity:0;transition:.2s;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.card:hover .card-overlay{opacity:1}
.card-name{font-size:12px;color:#eee;font-weight:500}
.empty{color:#555;font-size:14px;text-align:center;padding:60px 20px;display:none}

/* Lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:6px;display:block}
.lb-close{position:fixed;top:16px;right:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:50%;color:#fff;font-size:22px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.lb-close:hover{background:rgba(255,255,255,.22)}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:50%;color:#fff;cursor:pointer;font-size:26px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;transition:.15s;line-height:1}
.lb-nav:hover{background:rgba(255,255,255,.22)}
.lb-prev{left:16px}
.lb-next{right:16px}
.lb-label{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);border-radius:20px;font-size:12px;color:#bbb;padding:5px 14px;white-space:nowrap}
</style>

<div class="toolbar">
  <input id="search" placeholder="🔍  Search..." oninput="render()">
  <span id="count">Loading...</span>
  <select class="sort-select" id="sortSel" onchange="render()">
    <option value="default">Sort: Default</option>
    <option value="name-az">Name A→Z</option>
    <option value="name-za">Name Z→A</option>
  </select>
  <div class="view-btns">
    <button class="view-btn active" onclick="setView('grid-small',this)">⊞</button>
    <button class="view-btn"        onclick="setView('grid-medium',this)">⊟</button>
    <button class="view-btn"        onclick="setView('grid-large',this)">☰</button>
  </div>
</div>

<div class="gallery grid-small" id="gallery"></div>
<div class="empty" id="emptyMsg">No images match your search.</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="lbBgClick(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
  <img class="lb-img" id="lbImg" alt="">
  <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
  <div class="lb-label" id="lbLabel"></div>
</div>

<script>
let images=[], filtered=[], lbIdx=0;

fetch("./image_cache.json")
  .then(r=>r.json())
  .then(data=>{
    images=data.map((item,i)=>{
      if(typeof item==='string') return{url:item,name:'Image '+(i+1)};
      return{url:item.url||item,name:item.name||'Image '+(i+1)};
    });
    render();
  })
  .catch(()=>{document.getElementById('count').textContent='Could not load image_cache.json';});

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  filtered=images.filter(img=>img.name.toLowerCase().includes(q));
  const sort=document.getElementById('sortSel').value;
  if(sort==='name-az') filtered.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='name-za') filtered.sort((a,b)=>b.name.localeCompare(a.name));
  document.getElementById('count').textContent=filtered.length+' images';
  document.getElementById('emptyMsg').style.display=filtered.length?'none':'block';
  const gallery=document.getElementById('gallery');
  gallery.innerHTML='';
  filtered.forEach((img,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<img src="${img.url}" loading="lazy" alt="${img.name}" draggable="false"><div class="card-overlay"><div class="card-name">${img.name}</div></div>`;
    card.onclick=()=>openLb(i);
    gallery.appendChild(card);
  });
}

function setView(cls,btn){
  document.getElementById('gallery').className='gallery '+cls;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function openLb(i){
  lbIdx=i;
  showLb();
  document.getElementById('lb').classList.add('open');
}

function showLb(){
  const img=filtered[lbIdx];
  document.getElementById('lbImg').src=img.url;
  document.getElementById('lbImg').alt=img.name;
  document.getElementById('lbLabel').textContent=img.name+'  ·  '+(lbIdx+1)+' / '+filtered.length;
}

function closeLb(){document.getElementById('lb').classList.remove('open');}

function lbNav(dir){
  lbIdx=(lbIdx+dir+filtered.length)%filtered.length;
  showLb();
}

function lbBgClick(e){if(e.target===document.getElementById('lb'))closeLb();}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='ArrowRight') lbNav(1);
  if(e.key==='ArrowLeft')  lbNav(-1);
  if(e.key==='Escape')     closeLb();
});
</script>
